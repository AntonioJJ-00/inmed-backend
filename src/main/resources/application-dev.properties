server.port=8080

# ==========================
# Base de Datos
# ==========================

spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.1.100:5432/app_db}
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:AppSecure123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================
# JPA
# ==========================

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# JWT
# ==========================

jwt.secret=${JWT_SECRET:InmedJwtSecretKeyForEnterpriseApplication2026VerySecureKey}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================
# CORS
# ==========================

app.cors.allowed-origins=http://localhost:5173


